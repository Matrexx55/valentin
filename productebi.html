<!DOCTYPE html>
<html lang="ka">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>პროდუქცია - NATART</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFF5F5;
      --bg-header: #FFE8E8;
      --gold: #8B6508;
      --gold-light: #C49A1A;
      --text-dark: #4A4A4A;
      --white: #ffffff;
      --shadow: 0 4px 20px rgba(139,101,8,0.1);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background-color: var(--bg);
      color: var(--text-dark);
      line-height: 1.6;
    }

    header {
      background-color: var(--bg-header);
      padding: 18px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(139,101,8,0.07);
    }

    .logo-placeholder {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 3px;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 25px;
      list-style: none;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: var(--text-dark);
      font-weight: 500;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--gold); }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--gold);
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #d32f2f;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .shop-container {
      padding: 50px 5%;
      max-width: 1400px;
      margin: 0 auto;
      text-align: center;
    }

    .shop-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .shop-header p {
      margin-bottom: 40px;
      opacity: 0.8;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
    }

    .product-card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .img-container {
      width: 100%;
      height: 240px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .product-price {
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
    }

    .btn-add {
      display: block;
      width: 100%;
      padding: 10px;
      background: var(--gold);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover { background: #6e5006; }

    footer {
      background: var(--bg-header);
      text-align: center;
      padding: 30px;
      margin-top: 60px;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.show { display: flex; }

    .modal-content {
      background: var(--white);
      border-radius: var(--radius);
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      background: var(--gold);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
    }

    .modal-body {
      padding: 30px;
      flex: 1;
      overflow-y: auto;
    }

    .empty-cart {
      text-align: center;
      padding: 50px 20px;
      color: #999;
    }

    .empty-cart i {
      font-size: 3rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .cart-items { margin-bottom: 20px; }

    .cart-item {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 15px;
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 12px;
      align-items: center;
    }

    .item-name { font-weight: 600; }
    .item-price { text-align: center; font-weight: 600; }

    .qty-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .qty-btn {
      background: var(--gold);
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .qty-btn:hover { background: #6e5006; }

    .remove-btn {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      width: 100%;
    }

    .remove-btn:hover { background: #b71c1c; }

    .cart-summary {
      background: var(--bg);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .summary-row.total {
      border-top: 2px solid var(--gold);
      padding-top: 10px;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
    }

    .checkout-btn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .checkout-btn:hover { background: #6e5006; }

    @media (max-width: 768px) {
      nav { display: none; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-placeholder">NATART</a>
    <nav>
      <a href="index.html">მთავარი</a>
      <a href="index.html#about">ჩვენს შესახებ</a>
      <a href="index.html#sets">ნივთები</a>
      <a href="index.html#testimonials">შეფასება</a>
      <a href="index.html#contact">საკონტაქტო ინფორმაცია</a>
      <a href="productebi.html" style="color: var(--gold);">პროდუქტები</a>
      <div class="cart-icon" id="cartIcon" title="კალათა">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </nav>
  </header>

  <main class="shop-container">
    <div class="shop-header">
      <h1>სრული კოლექცია</h1>
      <p>ნახეთ NATART-ის ყველა ხელნაკეთი ნაკეთობა ერთ სივრცეში</p>
    </div>

    <div class="products-grid" id="product-list"></div>
  </main>

  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div class="modal-header">
        🛒 კალათა
        <button class="modal-close" id="cartClose">✕</button>
      </div>
      <div class="modal-body">
        <div id="cartItemsContainer"></div>
        <div id="cartSummaryContainer"></div>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2024 NATART. ყველა უფლება დაცულია.</p>
  </footer>

  <script>
    const products = [
      { id: 1, name: "ანგელოზების სეტი", price: 40, emoji: "👼" },
      { id: 2, name: "შემოდგომის სეტი", price: 40, emoji: "🍂" },
      { id: 3, name: "საშობაო სოფლის სეტი", price: 70, emoji: "🎄" },
      { id: 4, name: "ანგელოზები N2", price: 40, emoji: "👼" },
      { id: 5, name: "სეტი 5", price: 35, emoji: "🐚" },
      { id: 6, name: "სეტი 6", price: 45, emoji: "🎃" },
      ...Array(19).fill().map((_, i) => ({
        id: i + 7,
        name: `ნაკეთობა #${i + 7}`,
        price: 40,
        emoji: "🎨"
      }))
    ];

    let cart = JSON.parse(localStorage.getItem('natartCart')) || [];

    function renderProducts() {
      const grid = document.getElementById('product-list');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="img-container">${p.emoji}</div>
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-price">${p.price}₾</p>
            <button class="btn-add" onclick="addToCart(${p.id})">
              <i class="fas fa-cart-plus"></i> კალათაში
            </button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      const existing = cart.find(item => item.id === productId);

      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...product, qty: 1 });
      }

      saveCart();
      updateCartCount();
      document.getElementById('cartModal').classList.add('show');
      renderCart();
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      saveCart();
      renderCart();
      updateCartCount();
    }

    function changeQty(productId, change) {
      const item = cart.find(p => p.id === productId);
      if (item) {
        item.qty += change;
        if (item.qty <= 0) {
          removeFromCart(productId);
        } else {
          saveCart();
          renderCart();
          updateCartCount();
        }
      }
    }

    function renderCart() {
      const itemsDiv = document.getElementById('cartItemsContainer');
      const summaryDiv = document.getElementById('cartSummaryContainer');

      if (cart.length === 0) {
        itemsDiv.innerHTML = '<div class="empty-cart"><i class="fas fa-shopping-cart"></i><p>კალათა ცარიელია</p></div>';
        summaryDiv.innerHTML = '';
        return;
      }

      itemsDiv.innerHTML = `
        <div class="cart-items">
          ${cart.map(item => `
            <div class="cart-item">
              <div>${item.emoji} ${item.name}</div>
              <div class="item-price">${item.price}₾</div>
              <div style="text-align: right;">
                <div style="margin-bottom: 8px; font-weight: 600;">${item.price * item.qty}₾</div>
                <div class="qty-control">
                  <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                  <span style="min-width: 20px; text-align: center;">${item.qty}</span>
                  <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                </div>
              </div>
              <button class="remove-btn" onclick="removeFromCart(${item.id})">წაშლა</button>
            </div>
          `).join('')}
        </div>
      `;

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const delivery = 10;
      const total = subtotal + delivery;

      summaryDiv.innerHTML = `
        <div class="cart-summary">
          <div class="summary-row"><span>ქვესულ:</span><span>${subtotal}₾</span></div>
          <div class="summary-row"><span>მიწოდება:</span><span>${delivery}₾</span></div>
          <div class="summary-row total"><span>სულ:</span><span>${total}₾</span></div>
        </div>
        <button class="checkout-btn" onclick="goToCheckout(${total})">
          <i class="fas fa-credit-card"></i> შეკვეთა
        </button>
      `;
    }

    function goToCheckout(total) {
      const orderText = cart.map(item => `${item.emoji} ${item.name} - ${item.qty}x${item.price}₾ = ${item.price * item.qty}₾`).join('\n');
      const fullMessage = `📦 ჩემი შეკვეთა:\n\n${orderText}\n\n💰 სულ: ${total}₾`;

      localStorage.setItem('natartCheckoutMessage', fullMessage);
      localStorage.setItem('natartCheckoutTotal', total);
      window.location.href = 'index.html?checkout=true';
    }

    function saveCart() {
      localStorage.setItem('natartCart', JSON.stringify(cart));
    }

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cartCount').textContent = count;
    }

    document.getElementById('cartIcon').addEventListener('click', () => {
      document.getElementById('cartModal').classList.add('show');
      renderCart();
    });

    document.getElementById('cartClose').addEventListener('click', () => {
      document.getElementById('cartModal').classList.remove('show');
    });

    document.getElementById('cartModal').addEventListener('click', (e) => {
      if (e.target.id === 'cartModal') {
        document.getElementById('cartModal').classList.remove('show');
      }
    });

    renderProducts();
    updateCartCount();
    renderCart();
  </script>

</body>
</html>
