<!DOCTYPE html>
<html lang="ka">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>პროდუქცია - NATART</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFF5F5;
      --bg-header: #FFE8E8;
      --gold: #8B6508;
      --gold-light: #C49A1A;
      --text-dark: #4A4A4A;
      --white: #ffffff;
      --shadow: 0 4px 20px rgba(139,101,8,0.1);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background-color: var(--bg);
      color: var(--text-dark);
      line-height: 1.6;
    }

    header {
      background-color: var(--bg-header);
      padding: 18px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(139,101,8,0.07);
    }

    .logo-placeholder {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 3px;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 25px;
      list-style: none;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: var(--text-dark);
      font-weight: 500;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--gold); }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--gold);
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #d32f2f;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .shop-container {
      padding: 50px 5%;
      max-width: 1400px;
      margin: 0 auto;
      text-align: center;
    }

    .shop-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 30px;
    }

    .product-card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover { transform: translateY(-5px); }

    .img-container {
      width: 100%;
      height: 240px;
      background: #f0f0f0;
      overflow: hidden;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .product-price { font-weight: 600; color: #333; margin-bottom: 15px; }

    .btn-add {
      display: block; width: 100%; padding: 10px;
      background: var(--gold); color: white; border: none;
      border-radius: 8px; cursor: pointer; font-weight: 600;
    }

    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      background: var(--white); border-radius: var(--radius);
      max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .modal-header { background: var(--gold); color: white; padding: 15px; display: flex; justify-content: space-between; }
    .modal-body { padding: 20px; }

    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #eee;
    }
    
    .qty-btn { background: #eee; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }

    @media (max-width: 768px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-placeholder">NATART</a>
    <nav>
      <a href="index.html">მთავარი</a>
      <a href="productebi.html" style="color: var(--gold);">პროდუქტები</a>
      <div class="cart-icon" id="cartIcon">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </nav>
  </header>

  <main class="shop-container">
    <div class="shop-header">
      <h1>სრული კოლექცია</h1>
      <p>ნახეთ NATART-ის ყველა ხელნაკეთი ნაკეთობა</p>
    </div>
    <div class="products-grid" id="product-list"></div>
  </main>

  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>🛒 კალათა</span>
        <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">✕</button>
      </div>
      <div class="modal-body">
        <div id="cartItemsContainer"></div>
        <div id="cartSummaryContainer" style="margin-top:20px; border-top:2px solid var(--gold); padding-top:15px;"></div>
      </div>
    </div>
  </div>

  <script>
    // 1. პროდუქტების მასივი (გასწორებული ID და ფასები)
    const products = [
      { id: 1, name: "ანგელოზების სეტი", price: 40, img: "male.png" },
      { id: 2, name: "შემოდგომის სეტი", price: 40, img: "male.png" },
      { id: 3, name: "საშობაო სოფლის სეტი", price: 70, img: "male.png" },
      { id: 4, name: "ანგელოზები N2", price: 40, img: "male.png" },
      ...Array(21).fill().map((_, i) => ({
        id: i + 5,
        name: `ნაკეთობა #${i + 5}`,
        price: 25,
        img: "male.png" 
      }))
    ];

    let cart = JSON.parse(localStorage.getItem('natartCart')) || [];

    // 2. პროდუქტების გამოტანა (აქ p.img გამოვიყენე p.emoji-ს ნაცვლად)
    function renderProducts() {
      const grid = document.getElementById('product-list');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <div class="img-container">
            <img src="${p.img}" class="product-img" onerror="this.src='https://via.placeholder.com/250'">
          </div>
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-price">${p.price}₾</p>
            <button class="btn-add" onclick="addToCart(${p.id})">
              <i class="fas fa-cart-plus"></i> კალათაში
            </button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      const existing = cart.find(item => item.id === productId);

      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...product, qty: 1 });
      }

      saveCart();
      updateCartCount();
      renderCart();
      document.getElementById('cartModal').classList.add('show');
    }

    function changeQty(productId, delta) {
      const item = cart.find(p => p.id === productId);
      if (item) {
        item.qty += delta;
        if (item.qty <= 0) cart = cart.filter(p => p.id !== productId);
        saveCart();
        updateCartCount();
        renderCart();
      }
    }

    function renderCart() {
      const itemsDiv = document.getElementById('cartItemsContainer');
      const summaryDiv = document.getElementById('cartSummaryContainer');

      if (cart.length === 0) {
        itemsDiv.innerHTML = '<p style="text-align:center">კალათა ცარიელია</p>';
        summaryDiv.innerHTML = '';
        return;
      }

      itemsDiv.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div>
            <div style="font-weight:600">${item.name}</div>
            <div style="font-size:0.8rem; color:var(--gold)">${item.price}₾</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
            <span>${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            <b style="min-width:40px; text-align:right">${item.price * item.qty}₾</b>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      summaryDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px">
          <span>ჯამი:</span> <span>${total}₾</span>
        </div>
        <button class="btn-add" style="width:100%; padding:15px" onclick="checkout()">შეკვეთის გაფორმება</button>
      `;
    }

    function checkout() {
      const orderText = cart.map(item => `${item.name} (${item.qty}ც) - ${item.price * item.qty}₾`).join('\n');
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      alert("თქვენი შეკვეთა:\n" + orderText + "\n\nსულ: " + total + "₾\n\n(აქ შეგიძლიათ დაამატოთ ფორმაზე გადასვლა)");
    }

    function saveCart() { localStorage.setItem('natartCart', JSON.stringify(cart)); }
    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cartCount').textContent = count;
    }
    function closeModal() { document.getElementById('cartModal').classList.remove('show'); }

    document.getElementById('cartIcon').onclick = () => {
      renderCart();
      document.getElementById('cartModal').classList.add('show');
    };

    // სტარტი
    renderProducts();
    updateCartCount();
  </script>
</body>
</html>
