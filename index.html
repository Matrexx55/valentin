<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>💖 ვალენტინობა 💖</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap');

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
}

/* ---------- FIRST SCREEN ---------- */
#first {
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.card {
    background: white;
    padding: 50px 60px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    z-index: 2;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 42px;
    color: #ff4d6d;
    margin-bottom: 40px;
}

button {
    padding: 14px 38px;
    font-size: 18px;
    border-radius: 40px;
    border: none;
    cursor: pointer;
}

#yes {
    background: linear-gradient(135deg, #ff4d6d, #ff758f);
    color: white;
    margin-right: 20px;
}

#no {
    background: #adb5bd;
    color: white;
    position: fixed;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -20px;
    color: rgba(255,255,255,0.7);
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(0) scale(0.7); opacity: 0; }
    50% { opacity: 1; }
    to { transform: translateY(-110vh) scale(1.3); opacity: 0; }
}

/* ---------- SECOND SCREEN ---------- */
#second {
    display: none;
    height: 100vh;
    background: linear-gradient(135deg, #ff758f, #ffb3c6);
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    padding: 30px;
}

.love-box {
    max-width: 800px;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

.love-box h2 {
    font-family: 'Pacifico', cursive;
    font-size: 48px;
    margin-bottom: 20px;
}

.love-box p {
    font-size: 22px;
    margin-bottom: 30px;
}

/* Video style */
video {
    width: 100%;
    max-width: 700px;
    border-radius: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}
</style>
</head>

<body>

<!-- FIRST SCREEN -->
<div id="first">
    <div class="card">
        <h1>იქნები ჩემი ვალენტინი? 💘</h1>
        <button id="yes">კი 💖</button>
        <button id="no">არა 💔</button>
    </div>
</div>

<!-- SECOND SCREEN -->
<div id="second">
    <div class="love-box">
        <h2>მიყვარხარ 😍💖</h2>
        <p>
            ეს ვიდეო მხოლოდ შენთვისაა ❤️<br>
            Happy Valentine’s Day 💕
        </p>

        <!-- 🎥 VIDEO -->
        <video controls autoplay>
            <source src="video.mp4" type="video/mp4">
            შენი ბრაუზერი არ უჭერს მხარს ვიდეოს.
        </video>
    </div>
</div>

<script>
/* Hearts */
for (let i = 0; i < 30; i++) {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (14 + Math.random() * 30) + "px";
    h.style.animationDuration = (4 + Math.random() * 5) + "s";
    document.getElementById("first").appendChild(h);
}

/* No button escape */
const noBtn = document.getElementById("no");
noBtn.style.left = "55%";
noBtn.style.top = "60%";

noBtn.addEventListener("mouseenter", () => {
    noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
    noBtn.style.top = Math.random() * (window.innerHeight - 60) + "px";
});

/* Yes click */
document.getElementById("yes").addEventListener("click", () => {
    document.getElementById("first").style.display = "none";
    document.getElementById("second").style.display = "flex";
});
</script>

</body>
</html>
